name: deploy

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            # compose file (mantido no servidor; sobrescreve com a versão do repo para evitar drift)
            cat > docker-compose.prod.yml <<'YAML'
            services:
              web:
                image: ghcr.io/${{ github.repository }}:latest
                restart: unless-stopped
                env_file:
                  - .env
                ports:
                  - "4007:3000"
                healthcheck:
                  test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
            YAML

            # env file gerado a partir de secrets (não imprime valores)
            cat > .env <<'ENV'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            PASSWORD_PEPPER=${{ secrets.PASSWORD_PEPPER }}
            APP_NAME="${{ secrets.APP_NAME }}"
            PUBLIC_BASE_URL=${{ secrets.PUBLIC_BASE_URL }}
            NODE_ENV=production
            ENV

            # login no GHCR (se o pacote for privado, use GHCR_TOKEN; se for público, pode remover)
            if [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
              echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            fi

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f